name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2
          persist-credentials: false
        
      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1.1'
        
      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate supported Apple platforms
        run: |
          set -euo pipefail
          echo "Virgo supports macOS and iPad. iPhone targeting is intentionally disabled."

          xcodebuild -project Virgo.xcodeproj -scheme Virgo -showBuildSettings > build-settings.txt

          if ! grep -q "TARGETED_DEVICE_FAMILY = 2" build-settings.txt; then
            echo "Expected iOS-family builds to target iPad only: TARGETED_DEVICE_FAMILY = 2"
            grep "TARGETED_DEVICE_FAMILY" build-settings.txt || true
            exit 1
          fi

          if grep -q 'TARGETED_DEVICE_FAMILY = "1,2"' Virgo.xcodeproj/project.pbxproj; then
            echo "Found universal iPhone+iPad targeting in project settings."
            exit 1
          fi

          if grep -q "UISupportedInterfaceOrientations_iPhone" Virgo.xcodeproj/project.pbxproj; then
            echo "Found iPhone-specific orientation settings in project settings."
            exit 1
          fi

      - name: Clean build folder
        run: xcodebuild clean -project Virgo.xcodeproj -scheme Virgo
        
      - name: Check for required assets
        run: |
          echo "Checking for ticker audio asset..."
          find . -name "ticker.*" -type f
          echo "Checking Assets.xcassets structure..."
          find ./Virgo/Assets.xcassets -type f | head -10
        
      - name: Install test formatter and result parser
        run: brew install xcbeautify xcresultparser

      - name: Generate ServerEndpoints.env from CI variables
        env:
          GRAPHQL_ENDPOINT: ${{ vars.GRAPHQL_ENDPOINT }}
          R2_BASE_URL: ${{ vars.R2_BASE_URL }}
        run: bash .github/scripts/generate-endpoints-env.sh

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Virgo.xcodeproj \
            -scheme Virgo \
            -destination 'platform=macOS' \
            -configuration Debug \
            -only-testing:VirgoTests \
            -parallel-testing-enabled NO \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -enableCodeCoverage YES \
            -destination-timeout 300 \
            -derivedDataPath ./DerivedData \
            -resultBundlePath ./DerivedData/TestResults.xcresult \
          | xcbeautify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./DerivedData/TestResults.xcresult
          if-no-files-found: warn
          retention-days: 30

      - name: Export Coverage Report
        if: always()
        run: |
          set -e
          COVERAGE_DIR="$GITHUB_WORKSPACE/coverage"
          COVERAGE_REPORT="$COVERAGE_DIR/cobertura.xml"
          RESULT_BUNDLE="./DerivedData/TestResults.xcresult"

          if [ ! -e "$RESULT_BUNDLE" ]; then
            echo "No xcresult bundle found at $RESULT_BUNDLE"
            mkdir -p "$COVERAGE_DIR"
            echo "No coverage available" > "$COVERAGE_REPORT"
            exit 0
          fi

          echo "Found xcresult bundle: $RESULT_BUNDLE"

          if ! xcrun xccov view --report "$RESULT_BUNDLE" >/dev/null 2>&1; then
            echo "No coverage report available in $RESULT_BUNDLE"
            mkdir -p "$COVERAGE_DIR"
            echo "No coverage available" > "$COVERAGE_REPORT"
            exit 0
          fi

          mkdir -p "$COVERAGE_DIR"
          echo "Exporting coverage to Cobertura format..."
          xcresultparser --output-format cobertura --project-root "$GITHUB_WORKSPACE" "$RESULT_BUNDLE" > "$COVERAGE_REPORT" || true

          if [ ! -s "$COVERAGE_REPORT" ]; then
            echo "Coverage export failed or produced empty file"
            echo "No coverage available" > "$COVERAGE_REPORT"
          fi

          echo "Coverage report created at $COVERAGE_REPORT"
          ls -la "$COVERAGE_DIR"

      - name: Upload Coverage Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-results
          path: coverage
          if-no-files-found: warn
            

  build-archive:
    name: Test Archive Build (macOS)
    runs-on: macos-latest
    needs: [test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1.1'

      - name: Generate ServerEndpoints.env from CI variables
        env:
          GRAPHQL_ENDPOINT: ${{ vars.GRAPHQL_ENDPOINT }}
          R2_BASE_URL: ${{ vars.R2_BASE_URL }}
        run: bash .github/scripts/generate-endpoints-env.sh

      - name: Test archive build for macOS
        run: |
          xcodebuild archive \
            -project Virgo.xcodeproj \
            -scheme Virgo \
            -destination 'generic/platform=macOS' \
            -archivePath ./build/Virgo-macOS.xcarchive \
            -configuration Release \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -allowProvisioningUpdates

  build-ios:
    name: Build (iPad Simulator)
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1.1'

      - name: Generate ServerEndpoints.env from CI variables
        env:
          GRAPHQL_ENDPOINT: ${{ vars.GRAPHQL_ENDPOINT }}
          R2_BASE_URL: ${{ vars.R2_BASE_URL }}
        run: bash .github/scripts/generate-endpoints-env.sh

      - name: Build for iPad Simulator
        run: |
          xcodebuild build \
            -project Virgo.xcodeproj \
            -scheme Virgo \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  codecov:
    name: Upload Coverage to Codecov
    runs-on: macos-latest
    needs: test
    if: ${{ always() }}

    steps:
      - name: Checkout coverage commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2
          persist-credentials: false

      - name: Download coverage results
        uses: actions/download-artifact@v4
        with:
          name: coverage-results
          path: coverage-results

      - name: Validate coverage report
        run: |
          set -euo pipefail
          report="coverage-results/cobertura.xml"

          if [ ! -s "$report" ]; then
            echo "Coverage report is missing or empty"
            exit 1
          fi

          if ! xmllint --noout "$report"; then
            echo "Coverage report is not valid XML"
            exit 1
          fi

          if ! grep -Eq '<coverage([[:space:]>])' "$report"; then
            echo "Coverage report does not contain a Cobertura <coverage> root"
            exit 1
          fi

          echo "Coverage report is valid:"
          head -20 "$report"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage-results/cobertura.xml
          flags: unit-tests
          disable_search: true
          override_commit: ${{ github.event.pull_request.head.sha || github.sha }}
          override_branch: ${{ github.head_ref || github.ref_name }}
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  apply-review-refactors:
    name: Apply Guarded Review Refactors
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Apply refactors
        run: python3 .github/scripts/apply-review-refactors.py

      - name: Remove temporary refactor tooling
        run: |
          rm .github/apply-review-refactors
          rm .github/scripts/apply-review-refactors.py

      - name: Commit refactors
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: unify rhythm layout contracts"
          git push origin HEAD:codex/hpa-145-rhythm-timeline
